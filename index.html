<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ghost-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>GhostRoom — Secure. Temporary. Zero Trace.</title>
    <meta name="description" content="GhostRoom is a privacy-first, self-destructing encrypted chat and large file sharing platform. Create password-protected rooms, share files up to 10GB, and leave zero trace." />
    <meta name="keywords" content="encrypted chat, self-destruct, file sharing, privacy, anonymous, temporary rooms, end-to-end encryption" />
    <meta name="author" content="GhostRoom" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ghostroom.app" />

    <!-- Open Graph -->
    <meta property="og:title" content="GhostRoom — Secure. Temporary. Zero Trace." />
    <meta property="og:description" content="Create encrypted rooms, share files up to 10GB, chat in real time. Auto-destructs when done. No trace remains." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ghostroom.app" />
    <meta property="og:image" content="https://ghostroom.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GhostRoom — Secure. Temporary. Zero Trace." />
    <meta name="twitter:description" content="Encrypted, self-destructing rooms for chat + 10GB file sharing." />

    <!-- Theme -->
    <meta name="theme-color" content="#050507" />
    <meta name="color-scheme" content="dark" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GhostRoom" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
